# nginx configuration for the ETIL production server
# Copy this file and replace your-server.example.com with your actual domain.
#
# Handles TLS termination and reverse proxy:
#   - /mcp   → ETIL MCP Docker container (localhost:8080)
#   - /auth/ → ETIL OAuth endpoints (localhost:8080)
#
# Install:
#   sudo cp nginx-production.conf /etc/nginx/sites-available/etil.conf
#   sudo ln -sf /etc/nginx/sites-available/etil.conf /etc/nginx/sites-enabled/etil.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires: nginx worker must have read access to TLS certs.
#   sudo usermod -aG tlscert www-data
#   sudo systemctl restart nginx

# --- Rate limiting ---
# MCP endpoint: 100 req/sec per IP, burst 250
limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=100r/s;

# --- Connection limiting ---
# Max concurrent connections per IP for MCP
limit_conn_zone $binary_remote_addr zone=mcp_conn:10m;

# --- Port 80: redirect to HTTPS ---
server {
    listen 80;
    server_name your-server.example.com _;
    return 301 https://$host$request_uri;
}

# --- Port 443: HTTPS ---
# TLS termination, then route by path.
server {
    listen 443 ssl http2;
    server_name your-server.example.com _;

    # TLS certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-server.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-server.example.com/privkey.pem;

    # Request size and timeout limits
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # --- ETIL MCP endpoint ---
    location /mcp {
        # Rate limiting
        limit_req zone=mcp_limit burst=250 nodelay;
        limit_req_status 429;

        # Connection limiting: match MAX_SESSIONS (mcp_server.hpp)
        limit_conn mcp_conn 100;

        # API key presence check (defense in depth — app also validates)
        if ($http_authorization = '') {
            return 401 '{"error":"Unauthorized: missing Authorization header"}';
        }

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, GET, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Mcp-Session-Id, Accept" always;
        add_header Access-Control-Expose-Headers "Mcp-Session-Id" always;
        add_header Access-Control-Max-Age 86400 always;

        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Proxy to ETIL MCP Docker container
        proxy_pass http://127.0.0.1:8080/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-ready settings (for future streaming support)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # Pass through client headers
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Mcp-Session-Id $http_mcp_session_id;
    }

    # --- ETIL OAuth auth endpoints ---
    # No Authorization requirement — users call these BEFORE they have
    # a token (that's the whole point of the OAuth device flow).
    location /auth/ {
        # Rate limiting (tighter than /mcp to limit brute-force)
        limit_req zone=mcp_limit burst=20 nodelay;
        limit_req_status 429;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age 86400 always;

        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Proxy to ETIL MCP Docker container
        proxy_pass http://127.0.0.1:8080/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
}
