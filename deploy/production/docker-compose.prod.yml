# Production deployment for ETIL MCP + NATS broker.
#
# Usage (on the CI host or any target):
#   docker compose -f docker-compose.prod.yml --env-file /tmp/etil-compose-deploy.env up -d
#
# The env file is generated by scripts/deploy.sh during CI deploy (extracted
# from the previously running etil-mcp-http container, with required defaults
# backfilled). scripts/deploy.sh --local-deploy writes the file and then
# runs `docker compose up -d` against it.
#
# The env file supplies BOTH host-level interpolation vars (${ETIL_CERT_GID},
# ${ETIL_MONGO_GID}) used below AND the ETIL_* runtime env vars that the
# etil-mcp-http container needs. The `environment:` block below references
# those runtime vars via ${VAR} so they get resolved from the env file at
# compose parse time and passed into the container.
#
# Networks:
#   etil-net — user-defined bridge shared by etil-mcp-http and nats so the
#   ETIL channel-tap-nats primitive can reach the broker at nats://nats:4222.
#
# Volumes:
#   etil-sessions, etil-library — pre-existing data volumes (external: true
#   means compose will not create or delete them).

networks:
  etil-net:
    name: etil-net
    external: true

volumes:
  etil-sessions:
    external: true
  etil-library:
    external: true

services:
  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    networks:
      - etil-net
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  etil-mcp-http:
    image: etil-mcp:latest
    container_name: etil-mcp-http
    command: ["--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - etil-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # All ${VAR:?} references are required: compose will fail loudly if
    # the env file fed to `--env-file` omits any of them. This keeps host-
    # specific paths out of the tracked compose file (and out of commits).
    environment:
      - ETIL_MCP_API_KEY=${ETIL_MCP_API_KEY:?}
      - ETIL_HTTP_ALLOWLIST=${ETIL_HTTP_ALLOWLIST:-}
      - ETIL_AUTH_CONFIG=${ETIL_AUTH_CONTAINER_DIR:?}
      - ETIL_MONGODB_URI=${ETIL_MONGODB_URI:?}
      - ETIL_MONGODB_DATABASE=${ETIL_MONGODB_DATABASE:?}
      - ETIL_SESSIONS_DIR=${ETIL_SESSIONS_DIR:?}
      - ETIL_LIBRARY_DIR=${ETIL_LIBRARY_DIR:?}
    volumes:
      - etil-sessions:${ETIL_SESSIONS_DIR}
      - etil-library:${ETIL_LIBRARY_DIR}:ro
      - ${ETIL_AUTH_HOST_DIR:?}:${ETIL_AUTH_CONTAINER_DIR}
      - ${ETIL_MONGO_CLIENT_CERT_HOST:?}:${ETIL_MONGO_CLIENT_CERT_CONTAINER:?}:ro
      - ${ETIL_MONGO_CA_CERT_HOST:?}:${ETIL_MONGO_CA_CERT_CONTAINER:?}:ro
    group_add:
      - "${ETIL_CERT_GID:-1006}"
      - "${ETIL_MONGO_GID:-110}"
    read_only: true
    tmpfs:
      - /tmp:size=10M
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    pids_limit: 50
    restart: unless-stopped
    depends_on:
      - nats
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
