name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        build_type: [Debug, Release]

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # Make compile commands path-relative so absolute -I/-iquote args
      # don't fragment the hash space across runners or workspaces.
      CCACHE_BASEDIR: ${{ github.workspace }}
      # Permit ccache to ignore non-deterministic content that doesn't
      # affect output: time/date macros and file-mtime in headers (we
      # rebuild often enough that mtime doesn't track real change).
      CCACHE_SLOPPINESS: "time_macros,include_file_mtime,include_file_ctime,locale"
      CCACHE_MAXSIZE: "2G"
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "6"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (cached apt)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: build-essential cmake ninja-build ccache llvm-18-dev libllvm18 libtbb-dev libssl-dev libopenblas-dev liblapacke-dev
          version: 1.0

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.build_type }}-

      - name: Restore _deps cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Prime ccache stats
        run: |
          ccache --version
          ccache --zero-stats
          ccache --show-config | grep -E 'cache_dir|max_size|compression'

      - name: Configure
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DETIL_BUILD_JWT=ON \
            -DETIL_BUILD_HTTP_CLIENT=ON \
            -DETIL_BUILD_MONGODB=OFF

      - name: Build
        run: ninja -C build

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats --verbose

      - name: Diagnose Debug build failure
        if: failure() && matrix.build_type == 'Debug'
        run: |
          set +e
          echo "=== CPU flags ==="
          grep -m1 flags /proc/cpuinfo | tr ' ' '\n' | sort -u | tr '\n' ' '
          echo ""
          echo "=== Kernel ==="
          uname -a
          echo "=== gcc / asan / ubsan versions ==="
          gcc --version | head -1
          dpkg -l | grep -E "libasan|libubsan|libgcc" | head -10
          echo "=== Binary info ==="
          file build/bin/etil_signature_index_tests || true
          echo "=== ldd ==="
          ldd build/bin/etil_signature_index_tests || true
          echo "=== Direct invoke (capture exit signal) ==="
          ulimit -c unlimited
          ./build/bin/etil_signature_index_tests --gtest_list_tests
          rc=$?
          echo "EXIT=$rc"
          echo "=== strace signals + execve (last 80 lines) ==="
          sudo apt-get install -y strace gdb >/dev/null 2>&1 || true
          strace -f -e signal,execve,exit_group ./build/bin/etil_signature_index_tests --gtest_list_tests 2>&1 | tail -80
          echo "=== gdb: bt, registers, instruction at PC ==="
          gdb -batch \
              -ex "set pagination off" \
              -ex "run --gtest_list_tests" \
              -ex "bt 30" \
              -ex "info registers rip rsp rbp" \
              -ex "x/4i \$rip" \
              ./build/bin/etil_signature_index_tests 2>&1 | tail -60
          echo "=== addr2line for crash PC (offset within binary) ==="
          # PC 0x...0444 in PIE binary — strip the load offset (gdb showed 0x5555561e0444; binary base is 0x555555554000-ish)
          # use objdump to find the load addr, then compute offset
          objdump -h build/bin/etil_signature_index_tests | grep -E '\.text\s' | head -2
          # the function symbol is what we know precisely:
          nm build/bin/etil_signature_index_tests 2>/dev/null | grep '_M_move_assign.*basic_string.*char.*integral_constant' | head -3
          echo "=== Scan all .o files in build/ for AVX-512BW instructions ==="
          # vpbroadcastb with GPR source + vmovdqu8 are AVX-512BW-only.
          # Find which TUs have them, so we know the source of the crashing code.
          count=0
          for o in $(find build -name '*.o' 2>/dev/null | head -2000); do
              if objdump -d "$o" 2>/dev/null | grep -qE 'vpbroadcastb\s+%e[a-d]x,%xmm|vmovdqu8'; then
                  echo "AVX-512BW: $o"
                  count=$((count+1))
              fi
          done
          echo "Total .o files with AVX-512BW: $count"
          echo "=== Sample compile command for gtest-all.cc.o (from compile_commands.json) ==="
          # Use python since jq may not be present and json may have nested commas
          python3 -c "
import json
with open('build/compile_commands.json') as f:
    cc = json.load(f)
for e in cc:
    if 'gtest-all.cc' in e.get('file', ''):
        print(e.get('command', ''))
        break
" 2>&1 || true

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)
