name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            llvm-18-dev libllvm18 \
            libtbb-dev \
            libssl-dev \
            libopenblas-dev \
            liblapacke-dev

      - name: Configure
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DETIL_BUILD_JWT=ON \
            -DETIL_BUILD_HTTP_CLIENT=ON \
            -DETIL_BUILD_MONGODB=OFF \
            -DETIL_BUILD_LINALG=ON

      - name: Build
        run: ninja -C build

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc) --repeat until-pass:3
