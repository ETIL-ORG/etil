<g id="node8" class="node">
<title>ast_design</title>
<path fill="#4a90d9" stroke="black" stroke-width="2" d="M772,-503C772,-503 472,-503 472,-503 466,-503 460,-497 460,-491 460,-491 460,-336 460,-336 460,-330 466,-324 472,-324 472,-324 772,-324 772,-324 778,-324 784,-330 784,-336 784,-336 784,-491 784,-491 784,-497 778,-503 772,-503"/>
<text text-anchor="start" x="556" y="-488.2" font-family="Helvetica Neue" font-weight="bold" font-size="11.00" fill="white">AST Evolution Design</text>
<text text-anchor="start" x="571.5" y="-478.8" font-family="Helvetica Neue" font-size="9.00" fill="white">March 19 · 500+ lines</text>
<text text-anchor="start" x="525" y="-459.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Key insight:</text>
<text text-anchor="start" x="580" y="-459.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> Don&#39;t mutate bytecode randomly.</text>
<text text-anchor="start" x="514.5" y="-451.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Decompile to AST → mutate structurally → recompile.</text>
<text text-anchor="start" x="583.5" y="-432.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">7&#45;stage pipeline:</text>
<text text-anchor="start" x="518" y="-424.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;0. Marker opcodes (compiler hints for decompiler)</text>
<text text-anchor="start" x="558" y="-416.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;1. Bytecode → AST decompiler</text>
<text text-anchor="start" x="524" y="-408.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;2. AST → bytecode compiler (round&#45;trip fidelity)</text>
<text text-anchor="start" x="548" y="-400.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;3. Stack simulator + type inference</text>
<text text-anchor="start" x="509" y="-392.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;4. Type&#45;directed repair (deterministic shuffle insertion)</text>
<text text-anchor="start" x="527" y="-384.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;5. Semantic tags (tiered substitution queries)</text>
<text text-anchor="start" x="530.5" y="-376.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;6. AST genetic operators (4 mutation types)</text>
<text text-anchor="start" x="593.5" y="-357.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Innovations:</text>
<text text-anchor="start" x="524" y="-349.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;• Stack shuffles as type permutation operators</text>
<text text-anchor="start" x="496" y="-341.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;• 4 signature categories (fully/partially/opaque/constrained)</text>
<text text-anchor="start" x="526" y="-333.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;• Compile&#45;time type inference for : definitions</text>
</g>
