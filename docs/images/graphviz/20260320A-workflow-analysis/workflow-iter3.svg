<text text-anchor="start" x="513.5" y="-227.2" font-family="Helvetica Neue" font-weight="bold" font-size="11.00" fill="white">AST Evolution Implementation Plan</text>
<text text-anchor="start" x="560" y="-217.8" font-family="Helvetica Neue" font-size="9.00" fill="white">March 19 · v1.3.2 → v1.5.0</text>
<text text-anchor="start" x="505" y="-198.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Each of 7 stages independently testable and mergeable:</text>
<text text-anchor="start" x="509" y="-182.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Stage 0: BlockBegin/BlockEnd/BlockSeparator opcodes</text>
<text text-anchor="start" x="517" y="-174.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Stage 1: AST types + recursive descent decompiler</text>
<text text-anchor="start" x="519" y="-166.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Stage 2: AST compiler with backpatched branches</text>
<text text-anchor="start" x="538" y="-158.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Stage 3: Stack simulator, signature index</text>
<text text-anchor="start" x="513.5" y="-150.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Stage 4: Type&#45;directed repair (swap/rot/roll insertion)</text>
<text text-anchor="start" x="524.5" y="-142.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Stage 5: Semantic tags on 22 matrix/MLP words</text>
<text text-anchor="start" x="500.5" y="-134.6" font-family="Helvetica Neue" font-size="8.00" fill="white">Stage 6: 4 genetic operators + EvolutionEngine integration</text>
<text text-anchor="start" x="556" y="-118.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">66 new tests</text>
<text text-anchor="start" x="614" y="-118.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> across all stages.</text>
