<text text-anchor="start" x="664.5" y="-913.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> (mlp.til)</text>
<text text-anchor="start" x="524" y="-905.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;make&#45;layer, make&#45;network, forward, backward,</text>
<text text-anchor="start" x="545.5" y="-897.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;sgd&#45;update, train&#45;step, train, predict</text>
<text text-anchor="start" x="549.5" y="-889.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;Prerequisite: mat&#45;col&#45;vec primitive</text>
<text text-anchor="start" x="561.5" y="-870.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Layer 2 — SelectionEngine</text>
<text text-anchor="start" x="540" y="-862.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;4 strategies: Latest, WeightedRandom,</text>
<text text-anchor="start" x="576.5" y="-854.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;EpsilonGreedy, UCB1</text>
<text text-anchor="start" x="561" y="-835.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Layer 3 — EvolutionEngine</text>
<text text-anchor="start" x="542.5" y="-827.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;Genetic operators, fitness evaluation,</text>
<text text-anchor="start" x="569" y="-819.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> &#160;population management</text>
</g>
