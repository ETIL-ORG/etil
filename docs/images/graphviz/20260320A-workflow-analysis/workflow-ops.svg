<text text-anchor="start" x="466.5" y="-110.2" font-family="Helvetica Neue" font-weight="bold" font-size="11.00" fill="white">Long&#45;Running Jobs Policy</text>
<text text-anchor="start" x="522" y="-100.8" font-family="Helvetica Neue" font-size="9.00" fill="white">March 16</text>
<text text-anchor="start" x="439.5" y="-81.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Problem:</text>
<text text-anchor="start" x="480.5" y="-81.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> CI builds (~11 min) and deploys blocked</text>
