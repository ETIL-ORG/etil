<text text-anchor="start" x="522.5" y="-274.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Solution:</text>
<text text-anchor="start" x="441" y="-266.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• Pre&#45;built FetchContent deps → ~25s clean builds</text>
<text text-anchor="start" x="480" y="-258.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• Debug&#45;first workflow (dev.sh)</text>
<text text-anchor="start" x="476.5" y="-250.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• branch.sh for feature branches</text>
<text text-anchor="start" x="430.5" y="-242.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• super&#45;push.sh: build → test → bump → commit → push</text>
<text text-anchor="start" x="473.5" y="-226.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Impact:</text>
<text text-anchor="start" x="507.5" y="-226.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> 10x faster iteration cycle.</text>
