<text text-anchor="start" x="522.5" y="-57.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Solution:</text>
<text text-anchor="start" x="465" y="-49.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• Background agents for CI monitoring</text>
<text text-anchor="start" x="476" y="-41.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• Full output logged to /tmp/*.log</text>
<text text-anchor="start" x="474" y="-33.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• Never truncate build/test output</text>
<text text-anchor="start" x="451" y="-25.6" font-family="Helvetica Neue" font-size="8.00" fill="white">• Agent reports back only PASS/FAIL summary</text>
<text text-anchor="start" x="433.5" y="-9.6" font-family="Helvetica Neue" font-weight="bold" font-size="8.00" fill="white">Impact:</text>
<text text-anchor="start" x="467.5" y="-9.6" font-family="Helvetica Neue" font-size="8.00" fill="white"> Conversation stays responsive during builds.</text>
