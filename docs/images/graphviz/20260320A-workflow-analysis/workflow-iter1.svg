<text text-anchor="start" x="490.5" y="-595.1" font-family="Helvetica Neue" font-size="8.00" fill="white">• Element&#45;wise ops (mat&#45;hadamard, mat&#45;add&#45;col)</text>
<text text-anchor="start" x="477.5" y="-587.1" font-family="Helvetica Neue" font-size="8.00" fill="white">• Activation functions (relu, sigmoid, tanh + derivatives)</text>
<text text-anchor="start" x="500" y="-579.1" font-family="Helvetica Neue" font-size="8.00" fill="white">• Weight initialization (mat&#45;randn, xavier, he)</text>
<text text-anchor="start" x="497" y="-571.1" font-family="Helvetica Neue" font-size="8.00" fill="white">• Loss functions (MSE, softmax, cross&#45;entropy)</text>
<text text-anchor="start" x="477.5" y="-552.1" font-family="Helvetica Neue" font-size="8.00" fill="white">Recommended deferring in&#45;place ops until MLP working.</text>
